<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>omonkey</title>
<meta name="description" content="Independent Roblox developer — active games." />
<meta property="og:title" content="omonkey" />
<meta property="og:description" content="Independent Roblox developer — active games." />
<meta property="og:type" content="website" />
<meta name="theme-color" content="#06070a" />
<link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><circle cx='32' cy='32' r='28' fill='%23f5a524'/><circle cx='32' cy='32' r='14' fill='%2306070a'/></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" />
<link rel="stylesheet" href="/style.css?v=11" />
</head>
<body>

<canvas id="starfield" aria-hidden="true"></canvas>

<header class="topbar">
  <button type="button" class="brand brand-btn" data-open-contact aria-label="contact">
    <span class="dot"></span>
    <span>omonkey</span>
  </button>
  <nav>
    <a href="https://discord.com/users/1185297475907330179" target="_blank" rel="noopener">discord</a>
    <a href="https://www.roblox.com/users/10257839343/profile" target="_blank" rel="noopener">roblox</a>
  </nav>
</header>

<main class="web-stage" id="stage">
  <div class="pan-wrap" id="panWrap">
    <svg id="web-bg" aria-hidden="true">
      <defs>
        <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#f5a524" stop-opacity="0.18" />
          <stop offset="55%" stop-color="#f5a524" stop-opacity="0.05" />
          <stop offset="100%" stop-color="#f5a524" stop-opacity="0" />
        </radialGradient>
      </defs>
      <circle id="centerHalo" r="160" fill="url(#centerGlow)" />
      <g id="rings"></g>
    </svg>

    <div id="centerNode" class="center-node">
      <div class="center-orb">
        <img class="orb-inner" src="/monkey.png" alt="omonkey" />
      </div>
      <div class="center-label">
        <div class="center-name">omonkey</div>
        <div class="center-sub">building worlds on roblox</div>
      </div>
    </div>

    <svg id="web-threads" aria-hidden="true">
      <g id="threads"></g>
    </svg>

    <div id="nodes" class="nodes-layer"></div>
  </div>

  <div id="empty" class="empty-state" hidden>
    <p>no games published yet.</p>
  </div>

  <div class="zoom-controls" aria-label="zoom">
    <button id="zoomIn" class="zoom-btn" type="button" title="zoom in">+</button>
    <button id="zoomOut" class="zoom-btn" type="button" title="zoom out">−</button>
    <button id="zoomReset" class="zoom-btn" type="button" title="reset view">⤢</button>
  </div>
  <button id="recenter" class="recenter-btn" type="button" title="recenter" hidden>recenter</button>
</main>

<footer class="bottombar">
  <span id="counter"></span>
  <a href="/admin" class="admin-link" aria-label="admin">·</a>
</footer>

<div id="modal" class="modal" hidden>
  <div class="modal-backdrop" data-close></div>
  <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="m-title">
    <button class="modal-close" data-close aria-label="close">×</button>
    <div class="modal-media" id="m-media"></div>
    <div class="modal-body">
      <h2 id="m-title"></h2>
      <p id="m-desc"></p>
      <div class="modal-actions">
        <a id="m-play" class="btn btn-primary" target="_blank" rel="noopener">play</a>
        <span id="m-stats" class="stats"></span>
      </div>
    </div>
  </div>
</div>

<div id="contactModal" class="modal" hidden>
  <div class="modal-backdrop" data-close-contact></div>
  <div class="modal-card contact-card" role="dialog" aria-modal="true" aria-labelledby="c-title">
    <button class="modal-close" data-close-contact aria-label="close">×</button>
    <div class="modal-body">
      <h2 id="c-title">contact</h2>
      <p class="contact-lead">business inquiries</p>
      <a class="contact-email mono" href="mailto:business@omonkey.dev">business@omonkey.dev</a>
      <div class="contact-links">
        <a class="btn btn-ghost" href="https://discord.com/users/1185297475907330179" target="_blank" rel="noopener">discord</a>
        <a class="btn btn-ghost" href="https://www.roblox.com/users/10257839343/profile" target="_blank" rel="noopener">roblox</a>
      </div>
    </div>
  </div>
</div>

<script src="/app.js?v=11" type="module"></script>
</body>
</html>
